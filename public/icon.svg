<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e63946"/>
      <stop offset="100%" style="stop-color:#c1121f"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f4a261;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e63946;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Play button shape -->
  <polygon points="11,8 25,16 11,24" fill="white" opacity="0.95"/>
  <!-- Bottom accent bar -->
  <rect x="6" y="26" width="20" height="2.5" rx="1.25" fill="url(#stripe)" opacity="0.9"/>
</svg>
